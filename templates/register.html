<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Placement Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            font-family:'Segoe UI',sans-serif;
        }

        .register-card{
            width:100%;
            max-width:450px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            border-radius:20px;
            padding:35px;
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
            color:white;
            animation:fadeIn 0.8s ease-in-out;
        }

        .logo{
            font-size:55px;
            text-align:center;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:5px;
        }

        .subtitle{
            text-align:center;
            color:#e8e8e8;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-register{
            background:#00c853;
            border:none;
            border-radius:12px;
            padding:12px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-register:hover{
            transform:translateY(-2px);
            background:#00b248;
        }

        .btn-login{
            border-radius:12px;
            font-weight:600;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:#f1f1f1;
            font-size:14px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="logo">
        <i class="bi bi-robot"></i>
    </div>

    <h2 class="title">
        AI Placement Predictor
    </h2>

    <p class="subtitle">
        Create your account
    </p>

    <form action="/register" method="POST">

        <div class="mb-3">

            <label class="form-label">
                <i class="bi bi-person-fill"></i>
                Username
            </label>

            <input class="form-control"
                   type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                <i class="bi bi-lock-fill"></i>
                Password
            </label>

            <input class="form-control"
                   type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

        </div>

        <button class="btn btn-success btn-register w-100">
            <i class="bi bi-person-plus-fill"></i>
            Register
        </button>

    </form>

    <a href="/login"
       class="btn btn-light btn-login w-100 mt-3">
        <i class="bi bi-box-arrow-in-right"></i>
        Already have an account? Login
    </a>

    <div class="footer-text">
        Powered by AI & Machine Learning
    </div>

</div>

</body>
</html>
