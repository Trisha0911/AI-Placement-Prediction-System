<!DOCTYPE html>
<html>
<head>

    <title>Student Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Student Profile
        </h2>

        <table class="table table-bordered">

            <tr>
                <th>Name</th>
                <td>{{ student[1] }}</td>
            </tr>

            <tr>
                <th>CGPA</th>
                <td>{{ student[2] }}</td>
            </tr>

            <tr>
                <th>Aptitude</th>
                <td>{{ student[3] }}</td>
            </tr>

            <tr>
                <th>Communication</th>
                <td>{{ student[4] }}</td>
            </tr>

            <tr>
                <th>Projects</th>
                <td>{{ student[5] }}</td>
            </tr>

            <tr>
                <th>Internships</th>
                <td>{{ student[6] }}</td>
            </tr>

            <tr>
                <th>Certifications</th>
                <td>{{ student[7] }}</td>
            </tr>

            <tr>
                <th>DSA Score</th>
                <td>{{ student[8] }}</td>
            </tr>

            <tr>
                <th>Probability</th>
                <td>{{ student[9] }}%</td>
            </tr>

            <tr>
                <th>Result</th>
                <td>{{ student[10] }}</td>
            </tr>

        </table>

        <a href="/dashboard"
           class="btn btn-primary">
           Back
        </a>

    </div>

</div>

</body>
</html>
